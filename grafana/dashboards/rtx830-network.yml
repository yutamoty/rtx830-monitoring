      name: Annotations & Alerts
      query:
        datasource:
          name: '-- Grafana --'
        group: grafana
        kind: DataQuery
        spec: {}
        version: v0
cursorSync: Crosshair
editable: true
elements:
  panel-1:
    kind: Panel
    spec:
      data:
        kind: QueryGroup
        spec:
          queries:
            - kind: PanelQuery
              spec:
                hidden: false
                query:
                  group: prometheus
                  kind: DataQuery
                  spec:
                    expr: sysUpTime{device="rtx830"} / 100
                  version: v0
                refId: A
          queryOptions: {}
          transformations: []
      description: ''
      id: 1
      links: []
      title: System Uptime
      vizConfig:
        group: stat
        kind: VizConfig
        spec:
          fieldConfig:
            defaults:
              color:
                mode: thresholds
              thresholds:
                mode: absolute
                steps:
                  - color: green
                    value: 0
              unit: s
            overrides: []
          options:
            colorMode: value
            graphMode: none
            justifyMode: auto
            orientation: horizontal
            percentChangeColorMode: standard
            reduceOptions:
              calcs:
                - lastNotNull
              fields: ''
              values: false
            showPercentChange: false
            textMode: auto
            wideLayout: true
        version: 13.0.0-24139322263
  panel-10:

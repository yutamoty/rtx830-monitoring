        spec:
          fieldConfig:
            defaults:
              color:
                mode: palette-classic
              custom:
                axisBorderShow: false
                axisCenteredZero: true
                axisColorMode: text
                axisLabel: ''
                axisPlacement: auto
                barAlignment: 0
                barWidthFactor: 0.6
                drawStyle: line
                fillOpacity: 15
                gradientMode: opacity
                hideFrom:
                  legend: false
                  tooltip: false
                  viz: false
                insertNulls: false
                lineInterpolation: linear
                lineWidth: 1
                pointSize: 5
                scaleDistribution:
                  type: linear
                showPoints: never
                showValues: false
                spanNulls: false
                stacking:
                  group: A
                  mode: none
                thresholdsStyle:
                  mode: 'off'
              thresholds:
                mode: absolute
                steps:
                  - color: green
                    value: 0
              unit: bps
            overrides: []
          options:
            annotations:
              clustering: -1
              multiLane: false
            legend:
              calcs:

version: '3.8'

services:
  # SNMP Exporter - RTX830からSNMPデータを取得
  # カスタム snmp.yml を使用（if_mib + sysUpTime）
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    volumes:
      - ./snmp/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - --config.file=/etc/snmp_exporter/snmp.yml
    network_mode: host

  # Prometheus - メトリクスをスクレイプしてGrafana Cloudに送信
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/entrypoint.sh:/entrypoint.sh:ro
      - prometheus-data:/prometheus
    environment:
      - RTX830_HOST=${RTX830_HOST}
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_PROMETHEUS_USER=${GRAFANA_CLOUD_PROMETHEUS_USER}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
    entrypoint: /entrypoint.sh
    network_mode: host
    depends_on:
      - snmp-exporter

volumes:
  prometheus-data:
